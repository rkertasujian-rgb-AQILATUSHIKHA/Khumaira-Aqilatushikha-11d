<h1>Buyer Testimonial Ppulbatu !</h1>

<main class="formulir">
  <div id="testimonialList"></div>

<button id="removeAll" class="remove-all">Remove All</button>

</main>

  © 2026 Ppulbatu Book Store — All rights reserved
</footer>

<a href="#" class="back-top">↑</a>

<script>
  const container = document.getElementById('testimonialList');

  const testimoniList =
    JSON.parse(localStorage.getItem('testimoniList')) || [];

  if (testimoniList.length === 0) {
    container.innerHTML = "<p>No reviews yet, so tell ur testimonial viewers !</p>";
  } else {
    testimoniList.forEach((t, i) => {
      const el = document.createElement('div');
      el.className = 'testimoni-box';

      el.innerHTML = `
  <p><strong>Name:</strong> ${t.name}</p>
  <p><strong>Email:</strong> ${t.email}</p>
  <p><strong>Book Purchased:</strong> ${t.book}</p>
  <p><strong>Message:</strong> ${t.message}</p>
  <p><strong>Rate:</strong> ⭐ ${t.rate}/5</p>
`;
      container.appendChild(el);
    });
  }

  document.getElementById("removeAll").addEventListener("click", function () {
    const konfirmasi = confirm("Do you really want to delete all testimonials?");
    if (konfirmasi) {
      localStorage.removeItem("testimoniList");
      location.reload();
    }
  });
</script>
